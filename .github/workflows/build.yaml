name: Build Electron App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 22

    # Cache dependencies (faster builds)
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    # Linux dependencies for Electron
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libnotify-dev \
          libnss3 \
          libxss1 \
          libasound2t64 \
          libxtst6 \
          xauth \
          xvfb

    # Install root deps (skip scripts to avoid yt-dlp issues)
    - name: Install root deps
      run: npm install --include=dev --ignore-scripts

    # Install frontend deps
    - name: Install frontend deps
      run: cd frontend && npm install --ignore-scripts

    # Install yt-dlp manually (avoid GitHub API rate limit)
    - name: Install yt-dlp manually (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o desktop/bin/yt-dlp_macos
        chmod +x desktop/bin/yt-dlp_macos

    - name: Install yt-dlp manually (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o desktop/bin/yt-dlp
        chmod +x desktop/bin/yt-dlp

    - name: Install yt-dlp manually (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop/bin | Out-Null
        Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile desktop/bin/yt-dlp.exe

    # Build React frontend
    - name: Build frontend
      run: cd frontend && npm run build

    # Build Electron app
    - name: Build Electron
      run: npx electron-builder --publish=never

    # Upload artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: builds-${{ matrix.os }}
        path: dist/
