name: Build Desktop Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-latest
          label: macos
          build_cmd: npx electron-builder --mac dmg --x64 --arm64 --publish=never
          artifact_glob: |
            dist/*.dmg
        - os: windows-latest
          label: windows
          build_cmd: npx electron-builder --win nsis --x64 --publish=never
          artifact_glob: |
            dist/*.exe
        - os: ubuntu-latest
          label: linux
          build_cmd: npx electron-builder --linux AppImage --x64 --publish=never
          artifact_glob: |
            dist/*.AppImage

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 22

    # Cache dependencies (faster builds)
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    # Linux dependencies for Electron
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libnotify-dev \
          libnss3 \
          libxss1 \
          libasound2t64 \
          libxtst6 \
          fuse3 \
          xauth \
          xvfb
        sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

    # Install root deps (skip scripts to avoid yt-dlp issues)
    - name: Install root deps
      run: npm install --include=dev --ignore-scripts

    # Install frontend deps
    - name: Install frontend deps
      run: cd frontend && npm install --ignore-scripts

    # Install yt-dlp manually (avoid GitHub API rate limit)
    - name: Install yt-dlp manually (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o desktop/bin/yt-dlp_macos
        chmod +x desktop/bin/yt-dlp_macos

    - name: Install yt-dlp manually (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o desktop/bin/yt-dlp
        chmod +x desktop/bin/yt-dlp

    - name: Install yt-dlp manually (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop/bin | Out-Null
        Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile desktop/bin/yt-dlp.exe

    # Build React frontend
    - name: Build frontend
      run: cd frontend && npm run build

    - name: Ensure app-builder executable permission (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x node_modules/app-builder-bin/linux/x64/app-builder || true
        chmod +x node_modules/app-builder-bin/linux/arm64/app-builder || true

    # Build Electron app
    - name: Build Electron installers (macOS/Windows)
      if: matrix.os != 'ubuntu-latest'
      run: ${{ matrix.build_cmd }}

    - name: Build Electron installers (Linux retry)
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -e
        for attempt in 1 2 3; do
          echo "Linux AppImage build attempt ${attempt}/3"
          if npx electron-builder --linux AppImage --x64 --publish=never; then
            exit 0
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "Transient AppImage tool download failure, retrying in 15s..."
            sleep 15
          fi
        done
        echo "Linux AppImage build failed after 3 attempts"
        exit 1

    - name: Upload installers
      uses: actions/upload-artifact@v4
      with:
        name: aether-${{ matrix.label }}-installers
        path: ${{ matrix.artifact_glob }}
        if-no-files-found: error
