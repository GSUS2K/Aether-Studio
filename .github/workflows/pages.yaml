name: Deploy Website (GitHub Pages)

on:
  push:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # Set this in GitHub: Settings -> Secrets and variables -> Actions -> Variables
      # Example: https://api.aetherstudio.me (or temporary trycloudflare URL)
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_BUILD_VERSION: ${{ github.sha }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix frontend

    - name: Download Windows installer from latest Release
      run: |
        mkdir -p frontend/public
        curl -L -o frontend/public/Aether-Setup-x64.exe https://github.com/GSUS2K/Aether-Studio/releases/latest/download/Aether-Setup-x64.exe

    - name: Build frontend
      run: |
        echo "VITE_APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
        npm run build --prefix frontend

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/dist

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
