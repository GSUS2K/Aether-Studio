name: Publish GitHub Release

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-latest
          label: macos
          build_cmd: npx electron-builder --mac dmg --x64 --arm64 --publish=never
          artifact_glob: |
            dist/*.dmg
        - os: windows-latest
          label: windows
          build_cmd: npx electron-builder --win nsis --x64 --publish=never
          artifact_glob: |
            dist/*.exe
        - os: ubuntu-latest
          label: linux
          build_cmd: npx electron-builder --linux AppImage --x64 --publish=never
          artifact_glob: |
            dist/*.AppImage

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libnotify-dev \
          libnss3 \
          libxss1 \
          libasound2t64 \
          libxtst6 \
          xauth \
          xvfb

    - name: Install root dependencies
      run: npm ci --include=dev --ignore-scripts

    - name: Install frontend dependencies
      run: npm ci --prefix frontend --ignore-scripts

    - name: Install yt-dlp manually (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o desktop/bin/yt-dlp_macos
        chmod +x desktop/bin/yt-dlp_macos

    - name: Install yt-dlp manually (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p desktop/bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o desktop/bin/yt-dlp
        chmod +x desktop/bin/yt-dlp

    - name: Install yt-dlp manually (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop/bin | Out-Null
        Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile desktop/bin/yt-dlp.exe

    - name: Build frontend
      run: npm run build --prefix frontend

    - name: Build Electron installers
      run: ${{ matrix.build_cmd }}

    - name: Upload installers
      uses: actions/upload-artifact@v4
      with:
        name: aether-${{ matrix.label }}-installers
        path: ${{ matrix.artifact_glob }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download macOS installers
      uses: actions/download-artifact@v4
      with:
        name: aether-macos-installers
        path: release-assets/macos

    - name: Download Windows installers
      uses: actions/download-artifact@v4
      with:
        name: aether-windows-installers
        path: release-assets/windows

    - name: Download Linux installers
      uses: actions/download-artifact@v4
      with:
        name: aether-linux-installers
        path: release-assets/linux

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/macos/*
          release-assets/windows/*
          release-assets/linux/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
