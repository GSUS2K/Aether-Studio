<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <title>AH Music // Discord Activity</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#ff0000;padding:20px;z-index:99999;font-family:monospace;white-space:pre-wrap;overflow:auto;';
        div.innerHTML = '<h1 style="color:#00f2ff">NEURAL LINK ERROR</h1>' +
                        '<b>Message:</b> ' + msg + '<br>' +
                        '<b>Source:</b> ' + url + '<br>' +
                        '<b>Line:</b> ' + line + ' <b>Col:</b> ' + col + 
                        (error ? '<br><br><b>Stack Trace:</b><br>' + error.stack : '');
        document.body.appendChild(div);
      };
      window.onunhandledrejection = function(event) {
        console.error("Unhandled Rejection:", event.reason);
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;bottom:20px;left:20px;background:#ffaa00;color:#000;padding:12px 20px;z-index:99998;font-family:monospace;border-radius:8px;font-weight:bold;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.5);border-left:4px solid #000;';
        div.innerText = '⚠️ NEURAL LINK ALERT: ' + event.reason + ' (Click to dismiss)';
        div.onclick = function() { div.remove(); };
        document.body.appendChild(div);
        setTimeout(function() { if(div.parentNode) div.remove(); }, 8000);
      };
      console.log("Diagnostic Link Established");
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
