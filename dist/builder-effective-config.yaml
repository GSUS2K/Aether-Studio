directories:
  output: dist
  buildResources: build
appId: com.GSUS_2K.aether-studio
productName: Aether
mac:
  category: public.app-category.music
  target: dmg
  icon: icon.png
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
files:
  - filter:
      - desktop/**/*
      - frontend/dist/**/*
      - package.json
      - icon.png
      - lyrics-fetcher.js
      - .env
asarUnpack:
  - '**/node_modules/@distube/yt-dlp/bin/*'
  - '**/node_modules/ffmpeg-static/*'
  - desktop/bin/*
electronVersion: 41.1.0
